<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920">
    <title>페가수스인터넷상사 Brand Guide</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=SUIT:wght@400;500;600;700;800;900&family=Noto+Serif+KR:wght@400;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        /* 기본 초기화 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --sky: #4A90E2; --sky-light: rgba(74,144,226,0.12); --sky-mid: rgba(74,144,226,0.25);
            --gold: #D4AF37; --navy: #1A2B3C; --charcoal: #1A1A1A;
            --warm-white: #FAF7F2; --beige: #E8DFD0; --stone: #6B6862;
            --white: #ffffff;
        }

        /* 1. 스크롤 환경 설정 */
        html { scroll-behavior: smooth; }
        body {
            width: 100%;
            background: #111;
            /* 가로 1920px 고정 콘텐츠를 중앙에 배치 */
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: auto; 
        }

        /* 2. 레이아웃 수정: 세로로 나열 */
        .deck {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 100px 0; /* 상하단 여백 */
        }

        .slide {
            /* 모든 슬라이드를 보이게 설정 */
            display: flex !important; 
            position: relative !important; 
            width: 1920px;
            height: 1080px;
            font-family: 'SUIT', sans-serif;
            overflow: hidden;
            /* 페이지 사이 간격 200px */
            margin-bottom: 200px; 
            flex-shrink: 0;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .slide:last-child { margin-bottom: 0; }

        /* NAV & PROGRESS (고정 레이아웃) */
        .nav {
            position: fixed; bottom: 36px; left: 50%; transform: translateX(-50%);
            display: flex; align-items: center; gap: 20px; z-index: 999;
            background: rgba(26,43,60,0.85); backdrop-filter: blur(8px);
            border: 1px solid rgba(74,144,226,0.3); border-radius: 40px; padding: 10px 24px;
        }
        .nav button {
            background: none; border: none; color: rgba(255,255,255,0.6);
            font-family: 'Roboto Mono', monospace; font-size: 12px; letter-spacing: 2px;
            cursor: pointer; padding: 4px 12px; border-radius: 20px; transition: all .2s;
        }
        .nav button:hover { color: #fff; background: rgba(74,144,226,0.3); }
        .pager { color: rgba(255,255,255,0.5); font-family: 'Roboto Mono', monospace; font-size: 11px; letter-spacing: 2px; min-width: 60px; text-align: center; }
        .progress { height: 4px; background: rgba(74,144,226,0.2); position: fixed; top: 0; left: 0; width: 100%; z-index: 1000; }
        .progress-bar { height: 100%; background: var(--sky); width: 0%; transition: width 0.1s; }

        /* 기존 내부 컴포넌트 스타일 유지 (내용 생략 - 원본과 동일) */
        .eyebrow{font-family:'Roboto Mono',monospace;font-size:12px;font-weight:500;color:var(--sky);letter-spacing:5px;text-transform:uppercase;margin-bottom:16px;}.sky-rule{width:64px;height:3px;background:var(--sky);border-radius:2px;margin-bottom:28px}.slide-title{font-size:64px;font-weight:800;line-height:1.1;letter-spacing:-1px;color:var(--charcoal)}.slide-title.light{color:var(--white)}.sub{font-size:32px;font-weight:700;color:var(--charcoal);line-height:1.2}.sub.light{color:var(--white)}.body-text{font-size:19px;font-weight:400;color:var(--stone);line-height:1.7}.meta{font-family:'Roboto Mono',monospace;font-size:13px;color:var(--stone);letter-spacing:1px}.label{font-family:'Roboto Mono',monospace;font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--sky)}.section-num{font-family:'Roboto Mono',monospace;font-size:200px;font-weight:700;color:var(--sky-light);position:absolute;right:-20px;top:-60px;line-height:1;pointer-events:none;user-select:none;}
        #s1{background:var(--navy);flex-direction:column;justify-content:center;align-items:center}#s1 .cover-logo{width:320px;height:320px;object-fit:contain;margin-bottom:60px;filter:brightness(0) invert(1)}#s1 .cover-title{font-size:80px;font-weight:900;color:var(--white);letter-spacing:-2px;text-align:center;line-height:1.05;margin-bottom:20px}#s1 .cover-title span{color:var(--sky)}#s1 .cover-sub{font-family:'Roboto Mono',monospace;font-size:15px;color:rgba(255,255,255,0.45);letter-spacing:6px;text-transform:uppercase;text-align:center;margin-bottom:80px}#s1 .cover-tags{display:flex;gap:24px}#s1 .cover-tag{font-family:'Roboto Mono',monospace;font-size:11px;letter-spacing:3px;color:rgba(255,255,255,0.35);padding:8px 20px;border:1px solid rgba(255,255,255,0.15);border-radius:20px;text-transform:uppercase}#s1 .cover-rule{width:1px;height:120px;background:rgba(74,144,226,0.4);position:absolute;left:80px;top:50%;transform:translateY(-50%)}#s1 .cover-rule-r{width:1px;height:120px;background:rgba(74,144,226,0.4);position:absolute;right:80px;top:50%;transform:translateY(-50%)}#s1 .cover-index{position:absolute;right:80px;bottom:60px;display:flex;flex-direction:column;gap:8px;text-align:right}#s1 .cover-index-item{font-family:'Roboto Mono',monospace;font-size:11px;color:rgba(255,255,255,0.25);letter-spacing:2px}#s1 .cover-index-item span{color:var(--sky);margin-right:8px}
        #s2{background:var(--warm-white);flex-direction:column;padding:60px 80px}#s2 .header{margin-bottom:48px}#s2 .logo-grid{flex:1;display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(2,1fr);gap:2px}#s2 .logo-cell{background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;position:relative}#s2 .logo-cell img{max-height:180px;max-width:80%;object-fit:contain}#s2 .logo-cell .meta{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);white-space:nowrap}
        #s3{background:#fff;padding:60px 80px}#s3 .left{flex:1;display:flex;align-items:center;justify-content:center;position:relative}#s3 .left img{width:620px;height:auto;object-fit:contain}#s3 .right{width:560px;display:flex;flex-direction:column;justify-content:center;gap:0;padding-left:60px}#s3 .anatomy-item{padding:28px 0;border-bottom:1px solid var(--beige)}#s3 .anatomy-item:last-child{border-bottom:none}#s3 .anatomy-num{font-family:'Roboto Mono',monospace;font-size:11px;color:var(--sky);letter-spacing:3px;margin-bottom:8px}#s3 .anatomy-name{font-size:28px;font-weight:700;color:var(--charcoal);margin-bottom:6px}#s3 .anatomy-desc{font-size:16px;color:var(--stone);line-height:1.6}

        #s5{background:var(--warm-white);padding:60px 80px;flex-direction:column}#s5 .var-grid{flex:1;display:grid;grid-template-columns:repeat(2,1fr);grid-template-rows:repeat(2,1fr);gap:4px}#s5 .var-cell{background:#fff;display:flex;align-items:center;justify-content:center;position:relative;padding:40px}#s5 .var-cell.dark{background:var(--navy)}#s5 .var-cell img{max-height:220px;max-width:70%;object-fit:contain}#s5 .var-cell .meta{position:absolute;bottom:20px;left:32px}#s5 .var-cell.dark .meta{color:rgba(255,255,255,0.4)}#s5 .var-cell .var-num{position:absolute;top:20px;right:24px;font-family:'Roboto Mono',monospace;font-size:11px;color:var(--sky);letter-spacing:2px}
        #s6{background:var(--charcoal);flex-direction:column;padding:60px 80px}#s6 .top-section{margin-bottom:4px}#s6 .color-ver-row{display:flex;gap:4px;height:360px}#s6 .cv-cell{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;padding:32px}#s6 .cv-cell.white-bg{background:#fff}#s6 .cv-cell.sky-bg{background:var(--sky)}#s6 .cv-cell.navy-bg{background:var(--navy)}#s6 .cv-cell.black-bg{background:#111}#s6 .cv-cell.beige-bg{background:var(--beige)}#s6 .cv-cell.warm-bg{background:var(--warm-white)}#s6 .cv-cell img{height:140px;width:auto;object-fit:contain;margin-bottom:16px}#s6 .cv-label{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);font-family:'Roboto Mono',monospace;font-size:10px;letter-spacing:2px;white-space:nowrap}#s6 .bg-row{display:flex;gap:4px;flex:1}#s6 .bg-cell{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;position:relative}#s6 .bg-cell img{height:120px;width:auto;object-fit:contain}
        #s7{background:var(--navy);padding:60px 80px;flex-direction:column}#s7 .lockup-row{flex:1;display:flex;gap:4px}#s7 .lockup-cell{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);position:relative;padding:48px;gap:32px}#s7 .lockup-cell img{height:120px;width:auto;object-fit:contain;filter:brightness(0) invert(1)}#s7 .lockup-slogan{font-size:20px;font-weight:600;color:rgba(255,255,255,0.7);letter-spacing:2px;text-align:center;line-height:1.6}#s7 .lockup-rule{width:1px;height:40px;background:rgba(74,144,226,0.4)}#s7 .lockup-ver{font-size:13px;color:rgba(255,255,255,0.35);font-family:'Roboto Mono',monospace;letter-spacing:3px;position:absolute;top:24px;left:32px}
        #s8{background:var(--warm-white);padding:60px 80px;flex-direction:column}#s8 .dont-grid{flex:1;display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(2,1fr);gap:4px}#s8 .dont-cell{background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;position:relative;overflow:hidden}#s8 .dont-cell img{height:140px;width:auto;object-fit:contain;margin-bottom:20px}#s8 .dont-cell .x-mark{position:absolute;top:16px;right:16px;width:28px;height:28px;background:#E53935;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:700}#s8 .dont-cell .dont-rule{font-size:16px;color:var(--stone);text-align:center;line-height:1.5}#s8 .dont-cell .dont-title{font-size:20px;font-weight:700;color:var(--charcoal);margin-bottom:8px;text-align:center}
